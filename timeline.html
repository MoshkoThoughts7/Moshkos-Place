<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ציר הזמן של מושקו בפרלמנטום - שנות פעילות ותפקידים">
    <title>Timeline - MOSHKO'S</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Assistant:wght@400;700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="space-background">
        <!-- populated by shared.js -->
    </div>

    <!-- Global Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <!-- App Logic -->
    <script src="ragdoll_physics.js"></script>
    <script src="ragdoll_background.js"></script>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <!-- populated by shared.js -->
    </nav>

    <div id="content-root">
        <main id="main-content" dir="rtl" lang="he">


            <!-- Header -->
            <section class="parlamentum-header">
                <div class="container">
                    <h1 class="page-title" data-aos="zoom-in">הדרך שלי בפרלמנטום!</h1>
                </div>
            </section>

            <!-- Stats -->
            <div class="timeline-stats" data-aos="fade-up" data-aos-delay="200">
                <div class="stat-card">
                    <span class="stat-number" id="stat-roles">12</span>
                    <span class="stat-label">מספר תפקידים</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-years">3+</span>
                    <span class="stat-label">שנות פעילות</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-since">2022</span>
                    <span class="stat-label">שנת הצטרפות לצוות</span>
                </div>
            </div>

            <!-- Timeline -->
            <section class="timeline-section">
                <div id="timeline-root">
                    <!-- Populated by JS below -->
                </div>
            </section>

        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <!-- populated by shared.js -->
    </footer>

    <div id="ragdoll-container"></div>
    <div class="skin-control-panel">
        <input type="text" id="skin-username" placeholder="Minecraft Username" value="">
        <button onclick="window.changeSkin(document.getElementById('skin-username').value)">Change Skin</button>
        <button onclick="window.resetRagdoll()" style="background: #e74c3c;">Reset</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="shared.js"></script>
    <script src="script.js"></script>
    <script src="parlamentum_data.js"></script>

    <script>
        // Timeline data is loaded from parlamentum_data.js
        // Edit that file to add or remove entries - no need to touch this page.

        /* -- Helpers ------------------------------------------- */
        function parseDate(str) {
            const [d, m, y] = str.split('/').map(Number);
            return new Date(y, m - 1, d);
        }

        function formatDateHebrew(str) {
            const [d, m, y] = str.split('/');
            const months = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];
            return `${parseInt(d)}\u00A0 ${months[parseInt(m) - 1]}`;
        }

        /* -- Build Timeline ------------------------------------ */
        function buildTimeline() {
            // Sort entries chronologically (newest first)
            const sorted = [...PARLAMENTUM_TIMELINE].sort((a, b) => parseDate(b.date) - parseDate(a.date));

            // Update stats
            const years = new Set(sorted.map(e => e.date.split('/')[2]));

            document.getElementById('stat-roles').textContent = PARLAMENTUM_STATS.rolesCount || sorted.length;
            document.getElementById('stat-years').textContent = PARLAMENTUM_STATS.yearsActive || (years.size + '+');
            document.getElementById('stat-since').textContent = PARLAMENTUM_STATS.yearJoined || Math.min(...[...years].map(Number));

            const root = document.getElementById('timeline-root');
            root.innerHTML = '';

            let currentYear = null;
            let currentContainer = null;

            sorted.forEach((entry, idx) => {
                const year = entry.date.split('/')[2];

                // Year divider
                if (year !== currentYear) {
                    currentYear = year;

                    currentContainer = document.createElement('div');
                    currentContainer.className = 'timeline-container';
                    root.appendChild(currentContainer);

                    const divider = document.createElement('div');
                    divider.className = 'timeline-year-divider';
                    divider.setAttribute('data-aos', 'fade-up');
                    divider.innerHTML = `<span class="year-badge">${year}</span>`;
                    root.appendChild(divider);
                }

                const isRight = idx % 2 === 1;

                const item = document.createElement('div');
                item.className = `timeline-item ${entry.role}${isRight ? ' right' : ''}`;
                item.setAttribute('data-aos', isRight ? 'fade-left' : 'fade-right');
                item.setAttribute('data-aos-delay', '50');

                item.innerHTML = `
                <div class="timeline-card">
                    <span class="card-icon">${entry.icon}</span>
                    <div class="card-title">${entry.title}</div>
                    <div class="card-date">${formatDateHebrew(entry.date)}</div>
                </div>
            `;

                currentContainer.appendChild(item);
            });
        }

        /* -- Initialize ---------------------------------------- */
        function initParlamentum() {
            if (!document.getElementById('timeline-root')) return;
            buildTimeline();
            // AOS is initialized once globally by shared.js; just refresh after DOM changes
            if (window.AOS) {
                AOS.refreshHard();
            }
        }

        // Run immediately - script is at bottom of body so DOM is already ready.
        // shared.js will have already run initSharedComponents + AOS.init by this point.
        initParlamentum();

        // Also listen for page-load for SPA navigation (subsequent visits)
        window.addEventListener('page-load', initParlamentum);
    </script>
</body>

</html>
